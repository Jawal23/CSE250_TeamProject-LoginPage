<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — CipherShield</title>
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020101;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #f0f0f0;
            padding: 40px 0;
        }

        /* ── Same entrance animation as login/register pages ── */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── CipherShield title at the top ── */
        .company-name {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #b7410e;
            text-shadow:
                    0 0 10px rgba(183, 65, 14, 0.8),
                    0 0 20px rgba(183, 65, 14, 0.4);
            margin-bottom: 4px;
            animation: cardEntrance 0.6s ease both;
        }

        .company-tagline {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
            margin-bottom: 28px;
            animation: cardEntrance 0.6s ease 0.1s both;
        }

        /* ── Main card — same style as login/register ── */
        .card {
            background: #111111;
            border: 1px solid rgba(183, 65, 14, 0.35);
            border-radius: 14px;
            padding: 40px 36px;
            width: 380px;
            box-shadow:
                    0 0 30px rgba(183, 65, 14, 0.25),
                    0 0 80px rgba(183, 65, 14, 0.10),
                    0 0 2px  rgba(183, 65, 14, 0.40);
            animation: cardEntrance 0.6s ease 0.15s both;
        }

        /* Orange bar at the top of the card */
        .card-top-bar {
            height: 3px;
            background: linear-gradient(90deg, #b7410e, transparent);
            border-radius: 14px 14px 0 0;
            margin: -40px -36px 32px -36px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: bold;
            color: #f0f0f0;
            margin-bottom: 6px;
        }
        .card .subtitle {
            font-size: 13px;
            color: #888888;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 6px;
        }

        /* ── Step dividers ──
           The page has two "steps":
             Step 1: Find Account (visible on load)
             Step 2: Set New Password (hidden until Step 1 succeeds)
           A thin separator line sits between them when Step 2 appears. */
        .step-divider {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 24px 0;
        }

        .step-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #444444;
            margin-bottom: 16px;
        }

        /* ── Input fields ── */
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            color: #f0f0f0;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrapper input { padding-right: 44px; }
        input:focus { border-color: #b7410e; }

        /* Show/Hide eye button on password fields */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555555;
            cursor: pointer;
            font-size: 15px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #b7410e; }

        /* Standalone input (no eye toggle) */
        .plain-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            color: #f0f0f0;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            display: block;
        }
        .plain-input:focus { border-color: #b7410e; }

        /* ── Password Strength Bar ── */
        .strength-wrapper {
            margin-top: -14px;
            margin-bottom: 20px;
        }
        .strength-bar-track {
            height: 4px;
            background: #2a2a2a;
            border-radius: 99px;
            overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .strength-label {
            font-size: 11px;
            margin-top: 5px;
            color: #555555;
        }

        /* ── Confirm Password Match Indicator ── */
        .confirm-status {
            font-size: 12px;
            margin-top: -14px;
            margin-bottom: 20px;
            min-height: 16px;
        }
        .confirm-status.match    { color: #22c55e; }
        .confirm-status.no-match { color: #ef4444; }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            background: #b7410e;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #f0f0f0;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover  { background: #d4501a; }
        .btn:active { transform: scale(0.98); }

        .trust-badge {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #444444;
            letter-spacing: 0.5px;
        }

        /* ── Message area (errors + success) ── */
        .message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
        .message.error   { color: #ef4444; }
        .message.success { color: #22c55e; }

        /* ── Back to login link at the bottom ── */
        .bottom-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #888888;
        }
        .bottom-link a {
            color: #b7410e;
            text-decoration: none;
            font-weight: bold;
        }
        .bottom-link a:hover { text-decoration: underline; }

        /* ── Watermark in bottom-right corner ── */
        .watermark {
            position: fixed;
            bottom: 16px;
            right: 20px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #2a2a2a;
            pointer-events: none;
        }

    </style>
</head>
<body>

<div class="company-name">CipherShield</div>
<div class="company-tagline">Secure Access. Zero Compromise.</div>

<div class="card">
    <div class="card-top-bar"></div>

    <h1>Reset Password</h1>
    <div class="subtitle">Enter your username or email to find your account</div>


    <!-- ══════════════════════════════════════════════════════
         STEP 1 — FIND ACCOUNT
         The user types their username OR email.
         When they click "Find Account", we ask the server if
         that account exists. If yes, Step 2 appears.
    ══════════════════════════════════════════════════════ -->
    <div id="step1">

        <div class="step-label">Step 1 of 2 — Find your account</div>

        <label for="identifier">Username or Email Address</label>
        <input class="plain-input" type="text" id="identifier"
               placeholder="Enter your username or email" />

        <button class="btn" onclick="handleFindAccount()">Find Account</button>

    </div>


    <!-- ══════════════════════════════════════════════════════
         STEP 2 — SET NEW PASSWORD
         This section is hidden (display:none) when the page loads.
         It only appears after Step 1 succeeds (account found).
         The user sets a new password here.
    ══════════════════════════════════════════════════════ -->
    <div id="step2" style="display: none;">

        <hr class="step-divider" />
        <div class="step-label">Step 2 of 2 — Set your new password</div>

        <!-- New Password with eye toggle + strength bar -->
        <label for="new-password">New Password</label>
        <div class="input-wrapper">
            <input type="password" id="new-password" placeholder="Create a new strong password"
                   oninput="checkStrength()" />
            <button class="eye-btn" onclick="toggleVisibility('new-password', this)" tabindex="-1">👁</button>
        </div>

        <!-- Strength bar — same as register page -->
        <div class="strength-wrapper">
            <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strength-bar"></div>
            </div>
            <div class="strength-label" id="strength-label">Start typing to check strength</div>
        </div>

        <!-- Confirm New Password with eye toggle + match indicator -->
        <label for="confirm-password">Confirm New Password</label>
        <div class="input-wrapper">
            <input type="password" id="confirm-password" placeholder="Re-enter your new password"
                   oninput="checkMatch()" />
            <button class="eye-btn" onclick="toggleVisibility('confirm-password', this)" tabindex="-1">👁</button>
        </div>

        <!-- Shows "✓ Passwords match" or "✗ Passwords do not match" -->
        <div class="confirm-status" id="confirm-status"></div>

        <button class="btn" onclick="handleResetPassword()">Reset Password</button>

    </div>


    <div class="trust-badge">🔒 Secured Connection</div>
    <div class="message" id="message"></div>

    <div class="bottom-link">
        <a href="login.html">← Back to Login</a>
    </div>

</div>

<div class="watermark">CSE250 — Database Management Systems</div>


<script>

    // ── This variable stores the identifier the user typed in Step 1.
    //    We need it again in Step 2 when sending the reset request,
    //    so we save it here instead of making the user type it again.
    var savedIdentifier = "";


    // ── handleFindAccount ──────────────────────────────────────────
    // Called when the user clicks "Find Account" in Step 1.
    //
    // Steps:
    //   1. Check the identifier field is not empty
    //   2. Send POST /forgotpassword with { identifier }
    //   3. If the server says account found → show Step 2
    //   4. If not found → show error message
    // ──────────────────────────────────────────────────────────────
    function handleFindAccount() {

        var identifier = document.getElementById("identifier").value.trim();
        var msgBox     = document.getElementById("message");

        if (!identifier) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please enter your username or email.";
            return;
        }

        msgBox.className  = "message";
        msgBox.textContent = "Searching for your account...";

        fetch("/forgotpassword", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ identifier: identifier })
        })
            .then(function(response) { return response.json(); })
            .then(function(data) {

                if (data.success) {
                    // Account found — save the identifier and show Step 2
                    savedIdentifier = identifier;

                    // Hide Step 1 input + button so the user can't change it
                    document.getElementById("step1").style.display = "none";

                    // Show Step 2 (the new password form)
                    document.getElementById("step2").style.display = "block";

                    msgBox.className  = "message success";
                    msgBox.textContent = "✓ Account found. Please set your new password below.";

                } else {
                    // No account found with that username or email
                    msgBox.className  = "message error";
                    msgBox.textContent = data.message || "No account found with that username or email.";
                }
            })
            .catch(function() {
                msgBox.className  = "message error";
                msgBox.textContent = "Could not reach server. Is it running?";
            });
    }


    // ── handleResetPassword ────────────────────────────────────────
    // Called when the user clicks "Reset Password" in Step 2.
    //
    // Steps:
    //   1. Check new password is not empty
    //   2. Check confirm password is not empty
    //   3. Check both passwords match
    //   4. Check password is at least 8 characters (basic minimum)
    //   5. Send POST /resetpassword with { identifier, newPassword }
    //   6. On success → show green message + hide Step 2 form
    // ──────────────────────────────────────────────────────────────
    function handleResetPassword() {

        var newPassword     = document.getElementById("new-password").value.trim();
        var confirmPassword = document.getElementById("confirm-password").value.trim();
        var msgBox          = document.getElementById("message");

        if (!newPassword) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please enter a new password.";
            return;
        }
        if (!confirmPassword) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please confirm your new password.";
            return;
        }
        if (newPassword !== confirmPassword) {
            msgBox.className  = "message error";
            msgBox.textContent = "Passwords do not match. Please check and try again.";
            return;
        }
        if (newPassword.length < 8) {
            msgBox.className  = "message error";
            msgBox.textContent = "Password is too short. Please use at least 8 characters.";
            return;
        }

        msgBox.className  = "message";
        msgBox.textContent = "Resetting your password...";

        fetch("/resetpassword", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                identifier:  savedIdentifier,   // the username or email from Step 1
                newPassword: newPassword
            })
        })
            .then(function(response) { return response.json(); })
            .then(function(data) {

                if (data.success) {
                    // Password reset successfully — hide the form, show success message
                    document.getElementById("step2").style.display = "none";

                    msgBox.className  = "message success";
                    msgBox.textContent = "✓ Password reset successfully! You can now login with your new password.";

                } else {
                    msgBox.className  = "message error";
                    msgBox.textContent = data.message || "Something went wrong. Please try again.";
                }
            })
            .catch(function() {
                msgBox.className  = "message error";
                msgBox.textContent = "Could not reach server. Is it running?";
            });
    }


    // ── Show / Hide password toggle ──────────────────────────────
    function toggleVisibility(fieldId, btn) {
        var field = document.getElementById(fieldId);
        if (field.type === "password") {
            field.type      = "text";
            btn.textContent = "🙈";
        } else {
            field.type      = "password";
            btn.textContent = "👁";
        }
    }


    // ── Password Strength Checker (simplified — bar + label only) ──
    // Same logic as register.html but without the full rules checklist.
    // Just shows a bar (red / yellow / green) and a short label.
    function checkStrength() {
        var password = document.getElementById("new-password").value;
        var bar      = document.getElementById("strength-bar");
        var label    = document.getElementById("strength-label");

        if (password.length === 0) {
            bar.style.width   = "0%";
            label.textContent = "Start typing to check strength";
            label.style.color = "#555555";
            return;
        }

        var hasUpper   = /[A-Z]/.test(password);
        var hasLower   = /[a-z]/.test(password);
        var hasNumber  = /[0-9]/.test(password);
        var hasSpecial = /[!@#$%^&*(),.?":{}|<>_\-]/.test(password);
        var hasLength  = password.length >= 12;

        var score = [hasLength, hasUpper, hasLower, hasNumber, hasSpecial]
            .filter(Boolean).length;

        if (password.length < 8) {
            bar.style.width           = "33%";
            bar.style.backgroundColor = "#ef4444";
            label.textContent         = "🔴  Weak — too short";
            label.style.color         = "#ef4444";
        } else if (score <= 3 || password.length < 12) {
            bar.style.width           = "66%";
            bar.style.backgroundColor = "#f59e0b";
            label.textContent         = "🟡  Medium — could be stronger";
            label.style.color         = "#f59e0b";
        } else {
            bar.style.width           = "100%";
            bar.style.backgroundColor = "#22c55e";
            label.textContent         = "🟢  Strong — great password!";
            label.style.color         = "#22c55e";
        }

        // Also update the confirm match if the user has already typed there
        if (document.getElementById("confirm-password").value.length > 0) {
            checkMatch();
        }
    }


    // ── Confirm Password Match Checker ──────────────────────────
    function checkMatch() {
        var newPassword     = document.getElementById("new-password").value;
        var confirmPassword = document.getElementById("confirm-password").value;
        var statusEl        = document.getElementById("confirm-status");

        if (confirmPassword.length === 0) {
            statusEl.textContent = "";
            statusEl.className   = "confirm-status";
            return;
        }

        if (newPassword === confirmPassword) {
            statusEl.textContent = "✓ Passwords match";
            statusEl.className   = "confirm-status match";
        } else {
            statusEl.textContent = "✗ Passwords do not match";
            statusEl.className   = "confirm-status no-match";
        }
    }


    // Allow pressing Enter to submit whichever step is visible
    document.addEventListener("keydown", function(e) {
        if (e.key !== "Enter") return;
        // If Step 2 is visible, Enter submits Step 2, otherwise Step 1
        var step2 = document.getElementById("step2");
        if (step2.style.display === "block") {
            handleResetPassword();
        } else {
            handleFindAccount();
        }
    });

</script>
</body>
</html>
