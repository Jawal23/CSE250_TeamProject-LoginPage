<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — CipherShield</title>
    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #020101;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            color: #f0f0f0;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .company-name {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #b7410e;
            text-shadow:
                    0 0 10px rgba(183, 65, 14, 0.8),
                    0 0 20px rgba(183, 65, 14, 0.4);
            margin-bottom: 4px;
            animation: cardEntrance 0.6s ease both;
        }

        .company-tagline {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555555;
            margin-bottom: 28px;
            animation: cardEntrance 0.6s ease 0.1s both;
        }

        .card {
            background: #111111;
            border: 1px solid rgba(183, 65, 14, 0.35);
            border-radius: 14px;
            padding: 40px 36px;
            width: 380px;
            box-shadow:
                    0 0 30px rgba(183, 65, 14, 0.25),
                    0 0 80px rgba(183, 65, 14, 0.10),
                    0 0 2px  rgba(183, 65, 14, 0.40);
            animation: cardEntrance 0.6s ease 0.15s both;
        }

        .card-top-bar {
            height: 3px;
            background: linear-gradient(90deg, #b7410e, transparent);
            border-radius: 14px 14px 0 0;
            margin: -40px -36px 32px -36px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: bold;
            color: #f0f0f0;
            margin-bottom: 6px;
        }
        .card .subtitle {
            font-size: 13px;
            color: #888888;
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #888888;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            color: #f0f0f0;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrapper input { padding-right: 44px; }
        input:focus { border-color: #b7410e; }

        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555555;
            cursor: pointer;
            font-size: 15px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #b7410e; }

        /* ── CAPTCHA box ─────────────────────────────────────────────
           Sits just above the Login button.
           The question is shown in orange text so it stands out,
           and the answer input is smaller since it's just a number. */
        .captcha-box {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }

        /* The math question text e.g. "What is 4 + 7?" */
        .captcha-question {
            font-size: 14px;
            color: #b7410e;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Wrapper so the answer input doesn't stretch full width */
        .captcha-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Answer input — smaller, fixed width */
        .captcha-input-row input {
            width: 90px;
            margin-bottom: 0;
            text-align: center;
            font-size: 15px;
        }

        /* Small hint text */
        .captcha-hint {
            font-size: 11px;
            color: #444444;
            margin-top: 8px;
        }

        .btn {
            width: 100%;
            background: #b7410e;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            color: #f0f0f0;
            cursor: pointer;
            margin-top: 4px;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover  { background: #d4501a; }
        .btn:active { transform: scale(0.98); }

        .trust-badge {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #444444;
            letter-spacing: 0.5px;
        }

        .message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
        .message.error   { color: #ef4444; }
        .message.success { color: #22c55e; }

        .bottom-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #888888;
        }
        .bottom-link a {
            color: #b7410e;
            text-decoration: none;
            font-weight: bold;
        }
        .bottom-link a:hover { text-decoration: underline; }

        .watermark {
            position: fixed;
            bottom: 16px;
            right: 20px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #2a2a2a;
            pointer-events: none;
        }

    </style>
</head>
<body>

<div class="company-name">CipherShield</div>
<div class="company-tagline">Secure Access. Zero Compromise.</div>

<div class="card">
    <div class="card-top-bar"></div>

    <h1>Welcome</h1>
    <div class="subtitle">Sign in to your account</div>

    <!-- Username -->
    <label for="username">Username</label>
    <div class="input-wrapper">
        <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <!-- Password with Show/Hide toggle -->
    <label for="password">Password</label>
    <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter your password" />
        <button class="eye-btn" onclick="toggleVisibility('password', this)" tabindex="-1">👁</button>
    </div>

    <!-- ── Math CAPTCHA ──────────────────────────────────────────
         The question is generated by generateCaptcha() in the script
         below when the page loads. The answer is stored in a variable
         called captchaAnswer. We never show the answer on the page. -->
    <div class="captcha-box">
        <div class="captcha-question" id="captcha-question">Loading question...</div>
        <div class="captcha-input-row">
            <input type="number" id="captcha-answer" placeholder="Your answer" />
        </div>
        <div class="captcha-hint">Answer this to prove you are not a bot</div>
    </div>

    <!-- Login Button -->
    <button class="btn" onclick="handleLogin()">Login</button>

    <div class="trust-badge">🔒 Secured Connection</div>
    <div class="message" id="message"></div>

    <div class="bottom-link">
        Don't have an account? <a href="register.html">Register here</a>
    </div>
</div>

<div class="watermark">CSE250 — Database Management Systems</div>


<script>

    // ── CAPTCHA: stores the correct answer for the current question ──
    // This variable is kept in memory — the user cannot see it on the page.
    var captchaAnswer = 0;


    // ── generateCaptcha ────────────────────────────────────────────
    // Creates a new random math question (addition or subtraction).
    //
    // How it works:
    //   1. Pick two random numbers between 1 and 15
    //   2. Randomly decide: add or subtract
    //   3. For subtraction, make sure the bigger number comes first
    //      so the answer is never negative (keeps it simple)
    //   4. Show the question on screen, store the answer in captchaAnswer
    //   5. Clear the answer input box so the user has to type fresh
    // ──────────────────────────────────────────────────────────────
    function generateCaptcha() {

        var num1 = Math.floor(Math.random() * 15) + 1;  // random: 1 to 15
        var num2 = Math.floor(Math.random() * 15) + 1;  // random: 1 to 15

        // Randomly pick + or -
        var useAddition = Math.random() > 0.5;

        var questionText = "";

        if (useAddition) {
            captchaAnswer = num1 + num2;
            questionText  = "What is " + num1 + " + " + num2 + "?";
        } else {
            // Always put the bigger number first so result is never negative
            if (num1 < num2) {
                var temp = num1;
                num1 = num2;
                num2 = temp;
            }
            captchaAnswer = num1 - num2;
            questionText  = "What is " + num1 + " − " + num2 + "?";
        }

        document.getElementById("captcha-question").textContent = questionText;
        document.getElementById("captcha-answer").value = "";  // clear old answer
    }


    // ── Generate a question as soon as the page loads ─────────────
    generateCaptcha();


    // ── Show / Hide password toggle ───────────────────────────────
    function toggleVisibility(fieldId, btn) {
        var field = document.getElementById(fieldId);
        if (field.type === "password") {
            field.type      = "text";
            btn.textContent = "🙈";
        } else {
            field.type      = "password";
            btn.textContent = "👁";
        }
    }


    // ── handleLogin ───────────────────────────────────────────────
    // Order of checks:
    //   1. Username empty?
    //   2. Password empty?
    //   3. CAPTCHA answer empty?
    //   4. CAPTCHA answer wrong? → refresh question, show error
    //   5. All good → send to server
    // ─────────────────────────────────────────────────────────────
    function handleLogin() {

        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value.trim();
        var msgBox   = document.getElementById("message");

        // ── Field validation ──
        if (!username && !password) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please enter your username and password.";
            return;
        }
        if (!username) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please enter your username.";
            return;
        }
        if (!password) {
            msgBox.className  = "message error";
            msgBox.textContent = "Please enter your password.";
            return;
        }

        // ── CAPTCHA check ──
        var userAnswer = document.getElementById("captcha-answer").value.trim();

        if (userAnswer === "") {
            msgBox.className  = "message error";
            msgBox.textContent = "Please answer the security question.";
            return;
        }

        // parseInt converts the typed string to a number for comparison
        if (parseInt(userAnswer) !== captchaAnswer) {
            // Wrong answer — generate a NEW question immediately
            generateCaptcha();
            msgBox.className  = "message error";
            msgBox.textContent = "Incorrect answer. A new question has been generated.";
            return;
        }

        // ── All checks passed — send login request to server ──
        msgBox.className  = "message";
        msgBox.textContent = "Logging in...";

        fetch("/login", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: username, password: password })
        })
            .then(function(response) { return response.json(); })
            .then(function(data) {

                if (data.success) {
                    sessionStorage.setItem("user", JSON.stringify(data.user));
                    msgBox.className  = "message success";
                    msgBox.textContent = "Login successful! Redirecting...";
                    setTimeout(function() {
                        window.location.href = "dashboard.html";
                    }, 800);

                } else {
                    // Wrong credentials — also generate a new CAPTCHA question
                    // This means every failed attempt resets the CAPTCHA too
                    generateCaptcha();
                    msgBox.className  = "message error";
                    msgBox.textContent = "Username or Password is incorrect. Please try again.";
                }
            })
            .catch(function() {
                msgBox.className  = "message error";
                msgBox.textContent = "Could not reach server. Is it running?";
            });
    }


    // Allow pressing Enter key to submit
    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") handleLogin();
    });

</script>
</body>
</html>
